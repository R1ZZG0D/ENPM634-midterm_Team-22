{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h1 class="h3">Mailbox for {{ user.email }}</h1>
        {% for message in messages %}
        <div class="border rounded p-3 mb-3">
            <h2 class="h5">{{ message.subject }}</h2>
            {% if message.created_at %}
            <p class="small text-muted">{{ message.created_at }}</p>
            {% endif %}
            <p class="mb-0">{{ message.body }}</p>
        </div>
        {% else %}
        <p class="text-muted mb-0">No messages for this inbox.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
