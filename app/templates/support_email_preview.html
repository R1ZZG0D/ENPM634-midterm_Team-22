<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Email Verification Preview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="h3">Verification Preview</h1>
                        <p class="text-muted">
                            Internal training preview for the email verification flow.
                        </p>
                        {% if preview_email %}
                        <form
                            method="post"
                            action="{{ url_for('profile.verify_email') }}"
                            data-training-autosubmit="true"
                        >
                            <input type="hidden" name="email" value="{{ preview_email }}">
                            <div class="alert alert-info mb-3">
                                Preview target email: <code>{{ preview_email }}</code>
                            </div>
                            <button class="btn btn-primary" type="submit">Finalize verification</button>
                        </form>
                        <!-- auto-submits the form on page load -->
                        <script>
                            document.querySelector("form[data-training-autosubmit='true']").submit();
                        </script>
                        {% else %}
                        <div class="alert alert-warning mb-0">
                            Supply an <code>email</code> query parameter to generate the preview form.
                        </div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
