{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h3 mb-3">Password Recovery</h1>
                <p class="text-muted">Request a password reset link for a verified account email.</p>
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <input class="form-control" name="email" type="email" required>
                    </div>
                    <button class="btn btn-primary" type="submit">Send reset link</button>
                </form>
                {% if reset_requested %}
                <div class="alert alert-info mt-3 mb-0">
                    If the email exists, a reset message has been queued to that inbox.
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
