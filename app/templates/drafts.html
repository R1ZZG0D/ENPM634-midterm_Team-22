{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">Your Drafts</h1>
    <a class="btn btn-primary" href="{{ url_for('drafts.create_draft') }}">New Draft</a>
</div>

<div class="list-group">
    {% for draft in drafts %}
    <div class="list-group-item">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h2 class="h5 mb-1">{{ draft.title }}</h2>
                <p class="mb-1 text-muted">{{ draft.created_at }}</p>
            </div>
            <div>
                <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('drafts.view_draft', draft_id=draft.id) }}">View</a>
                {% if not draft.is_published %}
                <form class="d-inline" method="post" action="{{ url_for('drafts.publish_draft', draft_id=draft.id) }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <button class="btn btn-outline-primary btn-sm" type="submit">Publish</button>
                </form>
                {% endif %}
            </div>
        </div>
    </div>
    {% else %}
    <p class="text-muted">You have no drafts yet.</p>
    {% endfor %}
</div>
{% endblock %}
