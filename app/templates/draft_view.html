{% extends "base.html" %}
{% block content %}
<article class="card shadow-sm">
    <div class="card-body">
        <h1 class="h3">{{ draft.title }}</h1>
        <p class="text-muted">By {{ draft.username }} on {{ draft.created_at }}</p>
        <div class="mb-3" style="white-space: pre-wrap;">{{ draft.content }}</div>
        {% if current_user and current_user.id == draft.author_id and not draft.is_published %}
        <form method="post" action="{{ publish_url }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button class="btn btn-primary" type="submit">Publish draft</button>
        </form>
        {% endif %}
    </div>
</article>
{% endblock %}
